<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعد النباتات | 3D NAS</title>

<style>

body{
font-family:Tahoma;
background:#f4f8f3;
margin:0;
padding:20px;
}

.card{
background:white;
max-width:550px;
margin:auto;
padding:25px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.08);
}

.logo{
text-align:center;
font-size:28px;
margin-bottom:15px;
}

h1{
text-align:center;
color:#6b8e23;
}

select,button{
width:100%;
padding:15px;
border-radius:12px;
margin-top:10px;
font-size:17px;
}

select{
border:1px solid #ddd;
}

button{
background:#7a9a2d;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#f7f7f7;
border-radius:12px;
text-align:center;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">🌿 3D NAS</div>

<h1>مساعد النباتات</h1>

<select id="plant">

<option value="14">سانسيفيريا (14 يوم)</option>

<option value="7">دراسينا (7 أيام)</option>

<option value="5">بوتس (5 أيام)</option>

<option value="7">أجلونيما (7 أيام)</option>

<option value="10">فيلوديندرون (10 أيام)</option>

</select>

<button onclick="saveWatering()">

💧 تم ري النبتة

</button>

<div class="result" id="result">

اختر النبتة ثم سجل عملية الري

</div>

</div>

<script>

function saveWatering(){

let days =
document.getElementById("plant").value;

let next = new Date();

next.setDate(next.getDate()+parseInt(days));

localStorage.setItem(
"nextWatering",
next
);

document.getElementById("result").innerHTML =
"🌱 موعد الري القادم: <br><br>" +
next.toLocaleDateString("ar-SA");

}

window.onload=function(){

let next =
localStorage.getItem("nextWatering");

if(next){

document.getElementById("result").innerHTML =
"🌱 موعد الري القادم: <br><br>" +
new Date(next).toLocaleDateString("ar-SA");

}

}

</script>

</body>
</html>
