<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D NAS | دليل العناية بالنباتات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&amp;family=Amiri:wght@400;700&amp;display=swap" rel="stylesheet">
<style>
/* ── TOKENS (3D NAS Identity) ── */
:root {
  /* الألوان الأساسية المستوحاة من موقع 3D NAS */
  --bg-logo:        #fcfbfa;      /* درجة الأوف وايت الورقي */
  --nas-green:      #7FA043;      /* الأخضر العشبي المميز لكلمة NAS والورقة */
  --charcoal-dark:  #33383B;      /* الرمادي الفحمي الداكن */
  --panel-bg:       #ffffff;      /* الأبيض النقي للبطاقات واللوحات */
  --text-main:      var(--charcoal-dark);
  --text-muted:     #5a6164;      /* رمادي ناعم للنصوص الثانوية */
  --border-subtle:  rgba(51,56,59,0.1);
  --border-nas:     rgba(127,160,67,0.35);
  --card-shadow:    0 8px 24px rgba(51,56,59,0.05);
  --danger:         rgba(184,64,32,0.05);
  --danger-text:    #b83214;

  /* متغيرات إضافية للواجهة */
  --bg:              var(--bg-logo);
  --bg-2:            #f2f4ef;
  --surface:         var(--panel-bg);
  --surface-2:       #f2f4ef;
  --ink:             var(--text-main);
  --ink-2:           #3a4a30;
  --ink-3:           #5a6e50;
  --ink-4:           #8a9e7a;
  --leaf-dk:         #5a8c30;
  --leaf:            var(--nas-green);
  --leaf-lt:         #8bb35c;
  --leaf-pale:       #c8ddb4;
  --gold:            #9a6f28;
  --gold-lt:         #b88930;
  --gold-pale:       #f0dfa0;
  --rust:            #b84020;
  --rust-lt:         #d4623a;
  --border:          rgba(60,80,40,.1);
  --border-md:       rgba(51,56,59,0.12);
  --border-leaf:     rgba(127,160,67,0.28);
  --shadow-sm:       0 2px 12px rgba(30,50,20,.06);
  --shadow-md:       0 8px 32px rgba(30,50,20,.08);
  --shadow-lg:       0 20px 56px rgba(30,50,20,.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── AMBIENT — subtle on white ── */
.ambient {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 55% 45% at 5% 10%, rgba(127,160,67,.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 95% 90%, rgba(60,100,30,.05) 0%, transparent 55%);
}
.leaf-float {
  position: fixed; font-size: 16px; opacity: 0; pointer-events: none; z-index: 1;
  animation: drift linear infinite;
}
@keyframes drift {
  0%   { transform: translateY(105vh) rotate(0deg);  opacity: 0; }
  5%   { opacity: .07; }
  90%  { opacity: .04; }
  100% { transform: translateY(-8vh) rotate(540deg); opacity: 0; }
}

/* ── LAYOUT ── */
.wrap { position: relative; z-index: 2; max-width: 1120px; margin: 0 auto; padding: 0 20px 80px; }

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 0 22px; border-bottom: 1px solid var(--border-md);
  margin-bottom: 52px;
}
.logo { line-height: 1; }
.logo-name {
  font-family: 'Amiri', serif; font-size: 28px; font-weight: 700;
  color: var(--leaf-dk); letter-spacing: 1px; display: block;
}
.logo-sub {
  font-family: 'Cairo', sans-serif;
  font-size: 10px; font-weight: 600; letter-spacing: 3.5px;
  color: var(--ink-4); display: block; margin-top: 3px;
  text-transform: uppercase;
}
.back-btn {
  display: none; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--border-md);
  color: var(--ink-3); padding: 9px 20px; border-radius: 50px;
  font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s; box-shadow: var(--shadow-sm);
}
.back-btn:hover { background: var(--bg-2); border-color: var(--border-leaf); color: var(--leaf); }
.back-btn.visible { display: flex; }

/* ── HERO ── */
.hero { text-align: center; padding: 8px 0 60px; animation: rise .7s ease both; }
@keyframes rise   { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadein { from { opacity:0; transform:scale(.98);        } to { opacity:1; transform:scale(1);   } }

.hero-label {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(127,160,67,.1); border: 1px solid var(--border-nas);
  color: var(--leaf); padding: 7px 24px; border-radius: 40px;
  font-size: 10px; letter-spacing: 3px; font-weight: 700; margin-bottom: 28px;
  font-family: 'Cairo', sans-serif;
}
.hero h1 {
  font-family: 'Amiri', serif; font-weight: 700;
  font-size: clamp(54px, 9vw, 92px);
  line-height: .9; letter-spacing: 1px; margin-bottom: 20px;
  color: var(--leaf-dk);
}
.hero h1 span {
  display: block; color: var(--leaf-lt);
  font-size: clamp(30px, 5vw, 52px); margin-top: 6px;
}
.hero p {
  font-size: 15px; color: var(--ink-3); font-weight: 400;
  max-width: 420px; margin: 0 auto 44px; line-height: 2;
}
.hero-divider { display: flex; align-items: center; gap: 14px; max-width: 200px; margin: 0 auto; }
.hero-divider-line { flex: 1; height: 1px; background: var(--border-md); }
.hero-divider-gem { color: var(--leaf-lt); font-size: 12px; }

/* ── SEARCH ── */
.search-section { max-width: 660px; margin: 0 auto 44px; animation: rise .7s .1s ease both; }
.search-bar {
  display: flex; align-items: center;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: 16px; overflow: hidden; transition: all .25s;
  box-shadow: var(--shadow-sm);
}
.search-bar:focus-within {
  border-color: var(--leaf);
  box-shadow: 0 0 0 3px rgba(127,160,67,.15), var(--shadow-sm);
}
.search-bar input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--ink); font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 400;
  padding: 17px 20px;
}
.search-bar input::placeholder { color: var(--ink-4); }
.search-icon { padding: 0 18px; font-size: 17px; color: var(--ink-4); }
.filter-row {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 14px;
}
.fbtn {
  padding: 8px 18px; border-radius: 40px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: 'Cairo', sans-serif; transition: all .2s;
  background: var(--surface); border: 1px solid var(--border-md);
  color: var(--ink-3); box-shadow: var(--shadow-sm);
}
.fbtn:hover  { border-color: var(--leaf); color: var(--leaf); background: var(--bg-2); }
.fbtn.active { background: var(--leaf); border-color: var(--leaf); color: #fff; box-shadow: 0 4px 16px rgba(127,160,67,.3); }

/* ── PLANT GRID ── */
#view-catalog { animation: fadein .4s ease both; }
.count-line {
  text-align: center; font-size: 12px; color: var(--ink-4);
  letter-spacing: 1.5px; margin-bottom: 26px; font-weight: 500;
}
.plant-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(236px, 1fr));
  gap: 16px;
}
.plant-card {
  background: var(--surface); border: 2px solid transparent;
  border-radius: 20px; overflow: hidden; cursor: pointer;
  transition: transform .25s, border-color .25s, box-shadow .25s;
  box-shadow: var(--shadow-sm);
}
.plant-card:hover {
  transform: translateY(-5px);
  border-color: var(--leaf);
  box-shadow: var(--shadow-lg);
}
.card-top {
  padding: 24px 20px 16px;
  background: linear-gradient(160deg, rgba(127,160,67,.06) 0%, transparent 100%);
}
.card-emoji { font-size: 44px; display: block; margin-bottom: 14px; }
.card-name { font-family: 'Amiri', serif; font-size: 21px; font-weight: 700; color: var(--ink); margin-bottom: 3px; line-height: 1.2; }
.card-sci { font-size: 10px; color: var(--ink-4); font-style: italic; margin-bottom: 11px; font-weight: 400; }
.card-pills { display: flex; gap: 5px; flex-wrap: wrap; }
.pill {
  padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600;
  background: var(--bg-2); border: 1px solid var(--border-md);
  color: var(--ink-3);
}
.pill.green { background: rgba(127,160,67,.1); border-color: var(--border-nas); color: var(--leaf); }
.pill.amber { background: rgba(154,111,40,.08); border-color: rgba(154,111,40,.2); color: var(--gold); }
.pill.red   { background: rgba(184,64,32,.08);  border-color: rgba(184,64,32,.18); color: var(--rust); }
.card-bottom {
  padding: 14px 20px 18px; border-top: 1px solid var(--border);
  display: flex; gap: 0; background: var(--bg);
}
.card-stat { text-align: center; flex: 1; padding: 4px 0; }
.card-stat + .card-stat { border-right: 1px solid var(--border); }
.card-stat-val { font-size: 18px; line-height: 1; margin-bottom: 4px; }
.card-stat-lbl { font-size: 9px; color: var(--ink-4); letter-spacing: .4px; font-weight: 500; }

/* ── DETAIL VIEW ── */
#view-detail { display: none; animation: fadein .4s ease both; }

.detail-hero {
  display: grid; grid-template-columns: auto 1fr; gap: 28px;
  align-items: start; margin-bottom: 40px;
  padding: 36px; border-radius: 24px;
  background: var(--surface);
  border: 1px solid var(--border-md);
  box-shadow: var(--shadow-md);
}
.detail-emoji-box {
  width: 88px; height: 88px; border-radius: 20px;
  background: linear-gradient(135deg, rgba(127,160,67,.12), rgba(127,160,67,.05));
  border: 1px solid var(--border-leaf);
  display: flex; align-items: center; justify-content: center;
  font-size: 46px; flex-shrink: 0;
}
.detail-name {
  font-family: 'Amiri', serif; font-weight: 700;
  font-size: clamp(30px, 5vw, 44px); color: var(--ink); line-height: 1.05; margin-bottom: 5px;
}
.detail-sci { font-size: 12px; color: var(--ink-4); font-style: italic; margin-bottom: 14px; font-weight: 400; }
.detail-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  padding: 4px 13px; border-radius: 20px; font-size: 10px; font-weight: 600;
  background: var(--bg-2); border: 1px solid var(--border-md); color: var(--ink-3);
}
.tag.green { background: rgba(127,160,67,.1); border-color: var(--border-nas); color: var(--leaf); }
.tag.amber { background: rgba(154,111,40,.08); border-color: rgba(154,111,40,.2); color: var(--gold); }

/* SCHEDULE CARDS */
.schedule-title {
  font-family: 'Amiri', serif; font-size: 22px; font-weight: 700; color: var(--ink);
  margin-bottom: 16px; display: flex; align-items: center; gap: 12px;
}
.schedule-title-line { flex: 1; height: 1px; background: var(--border-md); }

.schedule-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px; margin-bottom: 40px;
}
.sched-card {
  border-radius: 18px; padding: 22px 20px;
  transition: transform .2s, box-shadow .2s;
  box-shadow: var(--shadow-sm);
}
.sched-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.sched-card.water  { background: rgba(127,160,67,.08); border: 1px solid var(--border-nas); }
.sched-card.fert   { background: #edfaf0; border: 1px solid #aedbba; }
.sched-card.prune  { background: #fdf6ec; border: 1px solid #e8cfa0; }
.sched-card.repot  { background: #f6eeff; border: 1px solid #d4b8f0; }
.sched-ico { font-size: 28px; margin-bottom: 10px; display: block; }
.sched-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px;
  color: var(--ink-4); font-family: 'Cairo', sans-serif;
}
.sched-val { font-family: 'Amiri', serif; font-size: 20px; font-weight: 700; color: var(--ink); line-height: 1.2; }
.sched-sub { font-size: 11px; color: var(--ink-3); margin-top: 6px; line-height: 1.7; font-weight: 400; }

/* INFO SECTIONS */
.info-sections { display: flex; flex-direction: column; gap: 22px; }

.info-block {
  border-radius: 20px; padding: 28px;
  border: 1px solid var(--border);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
}
.info-block-title {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Amiri', serif; font-size: 20px; font-weight: 700; color: var(--ink);
  margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border-md);
}
.info-block-ico {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: rgba(127,160,67,.1); border: 1px solid var(--border-leaf);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}

/* General info rows */
.gen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.gen-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
}
.gen-item-lbl { font-size: 10px; color: var(--ink-4); letter-spacing: .8px; margin-bottom: 5px; font-weight: 600; }
.gen-item-val { font-size: 14px; color: var(--ink); font-weight: 600; line-height: 1.4; }

/* Tips */
.tips-list { display: flex; flex-direction: column; gap: 9px; }
.tip-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 16px; border-radius: 13px;
  background: rgba(127,160,67,.06); border: 1px solid rgba(127,160,67,.14);
  font-size: 13px; color: var(--ink-2); line-height: 1.8; font-weight: 400;
}
.tip-ico { font-size: 17px; flex-shrink: 0; margin-top: 2px; }

/* Killers */
.killers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.killer-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 13px 16px; border-radius: 13px;
  background: rgba(184,64,32,.05); border: 1px solid rgba(184,64,32,.14);
  font-size: 12px; color: var(--ink-2); line-height: 1.75; font-weight: 400;
}
.killer-ico { font-size: 17px; flex-shrink: 0; margin-top: 2px; }
.killer-text strong { display: block; font-size: 13px; color: var(--rust); margin-bottom: 2px; font-weight: 700; }

/* Desc */
.desc-text { font-size: 14px; color: var(--ink-2); line-height: 2; font-weight: 400; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 64px 20px; color: var(--ink-4); font-size: 14px; line-height: 2.4; }
.empty-ico { font-size: 52px; display: block; margin-bottom: 16px; }

/* ── FOOTER ── */
footer {
  text-align: center; padding: 32px 0; margin-top: 20px;
  border-top: 1px solid var(--border-md);
  font-size: 12px; color: var(--ink-4); letter-spacing: .5px; font-weight: 500;
}
footer b { color: var(--leaf); }
footer a { color: var(--gold); text-decoration: none; }
footer a:hover { color: var(--leaf); }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .detail-hero { grid-template-columns: 1fr; gap: 18px; padding: 22px 18px; }
  .detail-emoji-box { width: 68px; height: 68px; font-size: 36px; }
  .info-block { padding: 20px 16px; }
  .schedule-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 420px) {
  .schedule-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="ambient"></div>

<div class="wrap">
  <header>
    <div class="logo">3D NAS <span>دليل النباتات</span></div>
    <button class="back-btn" id="back-btn" onclick="showCatalog()">
      ← العودة للدليل
    </button>
  </header>

  <!-- CATALOG VIEW -->
  <div id="view-catalog">

    <div class="hero">
      <div class="hero-label">✦ &nbsp; دليل العناية الشامل &nbsp; ✦</div>
      <h1>اعرف نبتتك</h1>
      <p>اختر أي نبتة واكتشف جدول الري والتسميد والتقليم وكل ما تحتاجه</p>
      <div class="hero-divider">
        <div class="hero-divider-line"></div>
        <div class="hero-divider-gem">✦</div>
        <div class="hero-divider-line"></div>
      </div>
    </div>

    <div class="search-section">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="ابحث عن نبتة بالاسم أو التصنيف..." oninput="renderGrid()">
      </div>
      <div class="filter-row">
        <button class="fbtn active" onclick="setFilter('الكل', this)">الكل</button>
        <button class="fbtn" onclick="setFilter('سهلة', this)">🟢 سهلة العناية</button>
        <button class="fbtn" onclick="setFilter('متوسطة', this)">🟡 متوسطة</button>
        <button class="fbtn" onclick="setFilter('صعبة', this)">🔴 تحتاج خبرة</button>
        <button class="fbtn" onclick="setFilter('داخلية', this)">🏠 داخلية</button>
        <button class="fbtn" onclick="setFilter('مزهرة', this)">🌸 مزهرة</button>
      </div>
    </div>

    <p class="count-line" id="count-line">35 نبتة</p>
    <div class="plant-grid" id="plant-grid"></div>

  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail">
    <div id="detail-content"></div>
  </div>

  <footer>
    🌿 &nbsp;<b>3D NAS</b>&nbsp; © 2025 &nbsp;·&nbsp;
    <a href="https://3d-nas.com/ar" target="_blank">زيارة المتجر ←</a>
  </footer>
</div>

    repot: 'كل 2 سنوات.',
    desc: 'أوراق خضراء داكنة براقة مع عروق حمراء وسيقان برغندية جذابة. من أكثر الفيلوديندرون طلباً.',
    tips: ['الأوراق الجديدة تخرج حمراء-وردية ثم تتحول للأخضر', 'تسلق بدعامة لأوراق أضخم', 'نادرة في الأسواق — احتفظ بها!'],
    killers: [
      { ico: '☀️', name: 'الشمس المباشرة', desc: 'تحترق وتفقد لونها المميز.' },
      { ico: '💧', name: 'الماء الراكد', desc: 'تعفن الجذور.' },
    ]
  },
];

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let currentFilter = 'الكل';

// ══════════════════════════════════════════════════════════
//  FLOATING LEAVES
// ══════════════════════════════════════════════════════════
['🍃','🌿','🍀','🌱','✦'].forEach((e, i) => {
  const el = document.createElement('div');
  el.className = 'leaf-float'; el.textContent = e;
  el.style.cssText = `right:${5+i*19}%; font-size:${12+i*3}px; animation-duration:${18+i*5}s; animation-delay:${i*3.5}s;`;
  document.body.appendChild(el);
});

// ══════════════════════════════════════════════════════════
//  FILTER
// ══════════════════════════════════════════════════════════
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

// ══════════════════════════════════════════════════════════
//  CATALOG GRID
// ══════════════════════════════════════════════════════════
function renderGrid() {
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const grid = document.getElementById('plant-grid');
  grid.innerHTML = '';
  let shown = 0;

  PLANTS.forEach((p, i) => {
    // filter by difficulty
    if (currentFilter !== 'الكل' && currentFilter !== p.diff && !p.tags.includes(currentFilter)) return;
    // search
    if (q && !p.name.toLowerCase().includes(q) && !p.sci.toLowerCase().includes(q)) return;

    shown++;
    const card = document.createElement('div');
    card.className = 'plant-card';
    card.onclick = () => showDetail(i);
    card.innerHTML = `
      <div class="card-top">
        <span class="card-emoji">${p.emoji}</span>
        <div class="card-name">${p.name}</div>
        <div class="card-sci">${p.sci}</div>
        <div class="card-pills">
          <span class="pill gold">${p.diff}</span>
          ${p.tags.slice(0,2).map(t=>`<span class="pill">${t}</span>`).join('')}
        </div>
      </div>
      <div class="card-bottom">
        <div class="card-stat">
          <div class="card-stat-val">💧</div>
          <div class="card-stat-lbl">كل ${p.water.freq.split('كل')[1]?.trim() || p.water.freq}</div>
        </div>
        <div class="card-stat">
          <div class="card-stat-val">🌡</div>
          <div class="card-stat-lbl">${p.temp}</div>
        </div>
        <div class="card-stat">
          <div class="card-stat-val">☀️</div>
          <div class="card-stat-lbl">${p.light.split(' ').slice(0,2).join(' ')}</div>
        </div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById('count-line').textContent = shown === PLANTS.length ? `${PLANTS.length} نبتة` : `${shown} نتيجة`;
  if (!shown) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <span class="empty-ico">🌿</span>لا توجد نتائج لـ "${q}"
    </div>`;
  }
}

// ══════════════════════════════════════════════════════════
//  DETAIL
// ══════════════════════════════════════════════════════════
function showDetail(idx) {
  const p = PLANTS[idx];
  document.getElementById('view-catalog').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  document.getElementById('back-btn').classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  document.getElementById('detail-content').innerHTML = `
    <!-- HERO -->
    <div class="detail-hero">
      <div class="detail-emoji-box">${p.emoji}</div>
      <div>
        <div class="detail-name">${p.name}</div>
        <div class="detail-sci">${p.sci}</div>
        <div class="detail-tags">
          <span class="tag gold">${p.diff}</span>
          <span class="tag gold">${p.origin}</span>
          ${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>

    <!-- SCHEDULE CARDS -->
    <div class="schedule-title"><span>جدول العناية</span><div class="schedule-title-line"></div></div>
    <div class="schedule-grid">
      <div class="sched-card water">
        <span class="sched-ico">💧</span>
        <div class="sched-label">الري</div>
        <div class="sched-val">${p.water.freq}</div>
        <div class="sched-sub">${p.water.how}</div>
      </div>
      <div class="sched-card fert">
        <span class="sched-ico">🌱</span>
        <div class="sched-label">التسميد</div>
        <div class="sched-val">${p.fert.freq}</div>
        <div class="sched-sub">${p.fert.how}</div>
      </div>
      <div class="sched-card prune">
        <span class="sched-ico">✂️</span>
        <div class="sched-label">التقليم</div>
        <div class="sched-val">${p.prune.freq}</div>
        <div class="sched-sub">${p.prune.how}</div>
      </div>
      <div class="sched-card repot">
        <span class="sched-ico">🪴</span>
        <div class="sched-label">إعادة الزراعة</div>
        <div class="sched-val">${p.repot.split('.')[0]}</div>
        <div class="sched-sub">${p.repot}</div>
      </div>
    </div>

    <!-- INFO SECTIONS -->
    <div class="info-sections">

      <!-- GENERAL INFO -->
      <div class="info-block">
        <div class="info-block-title">
          <div class="info-block-ico">📋</div>
          المعلومات العامة
        </div>
        <div class="gen-grid">
          <div class="gen-item"><div class="gen-item-lbl">☀️ متطلبات الضوء</div><div class="gen-item-val">${p.light}</div></div>
          <div class="gen-item"><div class="gen-item-lbl">🌡️ درجة الحرارة المثالية</div><div class="gen-item-val">${p.temp}</div></div>
          <div class="gen-item"><div class="gen-item-lbl">💦 الرطوبة المطلوبة</div><div class="gen-item-val">${p.humidity}</div></div>
          <div class="gen-item"><div class="gen-item-lbl">🪣 نوع التربة</div><div class="gen-item-val">${p.soil}</div></div>
          <div class="gen-item"><div class="gen-item-lbl">📏 الحجم البالغ</div><div class="gen-item-val">${p.size}</div></div>
          <div class="gen-item"><div class="gen-item-lbl">🌍 الموطن الأصلي</div><div class="gen-item-val">${p.origin}</div></div>
        </div>
      </div>

      <!-- DESCRIPTION -->
      <div class="info-block">
        <div class="info-block-title">
          <div class="info-block-ico">📖</div>
          عن النبتة
        </div>
        <p class="desc-text">${p.desc}</p>
      </div>

      <!-- TIPS -->
      <div class="info-block">
        <div class="info-block-title">
          <div class="info-block-ico">💡</div>
          نصائح العناية
        </div>
        <div class="tips-list">
          ${p.tips.map(t => `
            <div class="tip-item">
              <span class="tip-ico">🌿</span>
              ${t}
            </div>`).join('')}
        </div>
      </div>

      <!-- KILLERS -->
      <div class="info-block">
        <div class="info-block-title">
          <div class="info-block-ico">⚠️</div>
          ما يقتل هذه النبتة
        </div>
        <div class="killers-grid">
          ${p.killers.map(k => `
            <div class="killer-item">
              <span class="killer-ico">${k.ico}</span>
              <div class="killer-text">
                <strong>${k.name}</strong>
                ${k.desc}
              </div>
            </div>`).join('')}
        </div>
      </div>

    </div>
  `;
}

function showCatalog() {
  document.getElementById('view-catalog').style.display = 'block';
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('back-btn').classList.remove('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
renderGrid();
</script>
</body>
</html>
