<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D NAS - مساعد النباتات</title>

<style>
body{
font-family:Tahoma;
background:#f3f8f2;
padding:20px;
text-align:center;
}

.card{
background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

button{
background:#7a9a2d;
color:white;
border:none;
padding:15px 25px;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

h1{
color:#6b8e23;
}
</style>
</head>

<body>

<div class="card">

<h1>🌿 مساعد النباتات</h1>

<p>اضغط بعد ري النبتة</p>

<button onclick="watered()">
💧 تم ري النبتة
</button>

<h3 id="next"></h3>

</div>

<script>
function watered(){

let next = new Date();

next.setDate(next.getDate()+7);

document.getElementById("next").innerHTML =
"موعد الري القادم: " +
next.toLocaleDateString("ar-SA");

}
</script>

</body>
</html>
