<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعد النباتات | 3D NAS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:linear-gradient(180deg,#eef8ec,#ddebd8);
min-height:100vh;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.hero{
background:rgba(255,255,255,.85);
backdrop-filter:blur(10px);
padding:30px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo{
font-size:55px;
}

.hero h1{
color:#47642d;
margin-top:10px;
font-size:32px;
}

.hero p{
margin-top:10px;
color:#666;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.icon{
font-size:40px;
margin-bottom:10px;
}

.section{
background:white;
padding:25px;
border-radius:25px;
margin-top:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.section h2{
margin-bottom:15px;
color:#47642d;
}

.plants{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:12px;
}

.plant{
background:#f4f8f3;
padding:14px;
border-radius:15px;
text-align:center;
font-weight:bold;
}

select{
width:100%;
padding:15px;
border-radius:15px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#6f8f2b;
color:white;
font-size:17px;
margin-top:10px;
cursor:pointer;
}

.result{
margin-top:15px;
padding:15px;
background:#f4f8f3;
border-radius:15px;
text-align:center;
font-size:18px;
}

.store-btn{
display:block;
text-decoration:none;
background:#47642d;
color:white;
padding:18px;
border-radius:18px;
text-align:center;
font-size:18px;
font-weight:bold;
margin-top:20px;
}

footer{
text-align:center;
margin-top:25px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">

<div class="logo">🌿</div>

<h1>3D NAS</h1>

<p>
مساعد النباتات الذكي للعناية بالنباتات المنزلية
</p>

</div>

<div class="grid">

<div class="card">
<div class="icon">🪴</div>
<div>نباتاتي</div>
</div>

<div class="card">
<div class="icon">💧</div>
<div>جدول الري</div>
</div>

<div class="card">
<div class="icon">📖</div>
<div>دليل النباتات</div>
</div>

<div class="card">
<div class="icon">🌱</div>
<div>العناية</div>
</div>

</div>

<div class="section">

<h2>💧 حساب موعد الري</h2>

<select id="plant">

<option value="14">سانسيفيريا - كل 14 يوم</option>

<option value="5">بوتس - كل 5 أيام</option>

<option value="7">أجلونيما - كل 7 أيام</option>

<option value="7">دراسينا - كل 7 أيام</option>

<option value="10">فيلوديندرون - كل 10 أيام</option>

<option value="7">شيفليرا - كل 7 أيام</option>

<option value="10">كورديلين - كل 10 أيام</option>

</select>

<button onclick="saveWatering()">
تم ري النبتة 💧
</button>

<div class="result" id="result">
اختر النبتة ثم سجل عملية الري
</div>

</div>

<div class="section">

<h2>🪴 النباتات المتوفرة</h2>

<div class="plants">

<div class="plant">سانسيفيريا</div>
<div class="plant">بوتس</div>
<div class="plant">أجلونيما</div>
<div class="plant">دراسينا</div>
<div class="plant">فيلوديندرون</div>
<div class="plant">شيفليرا</div>
<div class="plant">كورديلين</div>

</div>

</div>

<a class="store-btn" href="https://3d-nas.com/ar" target="_blank">
🛒 زيارة متجر 3D NAS
</a>

<footer>

🌿 صُمم بواسطة 3D NAS

</footer>

</div>

<script>

function saveWatering(){

let days =
document.getElementById("plant").value;

let next = new Date();

next.setDate(
next.getDate()+parseInt(days)
);

localStorage.setItem(
"nextWatering",
next
);

document.getElementById("result").innerHTML =
"🌱 موعد الري القادم:<br><br>" +
new Date(next).toLocaleDateString("ar-SA");

}

window.onload=function(){

let next=
localStorage.getItem("nextWatering");

if(next){

document.getElementById("result").innerHTML =
"🌱 موعد الري القادم:<br><br>" +
new Date(next).toLocaleDateString("ar-SA");

}

}

</script>

</body>
</html>
