<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D NAS | نظام إدارة العناية بالنباتات</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary-color: #2c4c38;
    --primary-light: #4a7c59;
    --accent-color: #8fcb9b;
    --bg-gradient: linear-gradient(135deg, #f4f9f4 0%, #e8f0e8 100%);
    --card-shadow: 0 10px 30px rgba(44, 76, 56, 0.05);
    --hover-shadow: 0 15px 35px rgba(44, 76, 56, 0.12);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
    transition: all 0.25s ease;
}

body {
    background: var(--bg-gradient);
    min-height: 100vh;
    padding: 40px 20px;
    color: #333;
}

.container {
    max-width: 1100px;
    margin: auto;
}

/* الهيرو - الواجهة الرئيسية */
.hero {
    background: white;
    border-radius: 30px;
    padding: 40px 35px;
    text-align: center;
    box-shadow: var(--card-shadow);
    margin-bottom: 30px;
    position: relative;
    overflow: hidden;
}

.hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, var(--primary-light), var(--accent-color));
}

.hero-icon {
    font-size: 60px;
    color: var(--primary-light);
    margin-bottom: 10px;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

.hero h1 {
    font-size: 42px;
    color: var(--primary-color);
    font-weight: 800;
    margin-bottom: 10px;
}

.hero p {
    color: #666;
    font-size: 18px;
}

/* أقسام الموقع */
.section {
    background: white;
    padding: 35px;
    border-radius: 28px;
    margin-bottom: 30px;
    box-shadow: var(--card-shadow);
}

.section h2 {
    color: var(--primary-color);
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 2px solid #f0f7f1;
    padding-bottom: 12px;
}

.section h2 i {
    color: var(--primary-light);
}

/* نظام ري النباتات المضافة */
.input-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

select {
    flex: 1;
    min-width: 250px;
    padding: 16px 20px;
    border-radius: 16px;
    border: 2px solid #e2eee3;
    font-size: 16px;
    font-weight: 600;
    color: #444;
    background-color: #fafdfa;
    outline: none;
}

select:focus {
    border-color: var(--primary-light);
}

button.btn-main {
    padding: 16px 35px;
    border: none;
    border-radius: 16px;
    background: var(--primary-color);
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(44, 76, 56, 0.15);
}

button.btn-main:hover {
    background: var(--primary-light);
    transform: translateY(-2px);
}

.result {
    padding: 20px;
    background: #f4f9f4;
    border-radius: 18px;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    color: var(--primary-color);
    border-right: 5px solid var(--primary-light);
}

/* قائمة "نباتاتي الحالية" المضافة */
.my-plants-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
}

.my-plant-card {
    background: #fdfdfd;
    border: 2px dashed var(--accent-color);
    padding: 15px 20px;
    border-radius: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
    color: var(--primary-color);
}

.remove-btn {
    background: none;
    border: none;
    color: #cc5a5a;
    cursor: pointer;
    font-size: 16px;
}

.remove-btn:hover {
    color: #e63946;
    transform: scale(1.15);
}

.empty-message {
    grid-column: 1 / -1;
    text-align: center;
    color: #888;
    padding: 20px;
    font-style: italic;
}

/* جدول ومكتبة النباتات الكبرى (بدون صور) */
.plants-library {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 15px;
    max-height: 500px;
    overflow-y: auto;
    padding-right: 5px;
}

/* تجميل شريط التمرير */
.plants-library::-webkit-scrollbar {
    width: 6px;
}
.plants-library::-webkit-scrollbar-thumb {
    background-color: var(--accent-color);
    border-radius: 10px;
}

.library-item {
    background: #fafdfa;
    border: 1px solid #edf4ee;
    padding: 18px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: flex-start;
    box-shadow: 0 4px 10px rgba(0,0,0,0.01);
}

.library-item:hover {
    border-color: var(--primary-light);
    background: white;
    box-shadow: var(--hover-shadow);
    transform: translateY(-3px);
}

.library-info h3 {
    font-size: 18px;
    color: var(--primary-color);
    font-weight: 700;
    margin-bottom: 4px;
}

.library-info span {
    font-size: 13px;
    color: #777;
    background: #eff5f0;
    padding: 2px 10px;
    border-radius: 20px;
    display: inline-block;
}

.add-plant-btn {
    margin-top: 12px;
    background: none;
    border: 1px solid var(--primary-light);
    color: var(--primary-light);
    padding: 6px 14px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
    text-align: center;
}

.add-plant-btn:hover {
    background: var(--primary-light);
    color: white;
}

/* زر المتجر الفخم */
.store-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
    color: white;
    padding: 20px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 22px;
    font-weight: 700;
    box-shadow: 0 10px 25px rgba(44, 76, 56, 0.2);
}

.store-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(44, 76, 56, 0.3);
}

footer {
    text-align: center;
    margin-top: 40px;
    color: #888;
    font-size: 15px;
}
</style>
</head>

<body>

<div class="container">

    <div class="hero">
        <div class="hero-icon"><i class="fa-solid fa-seedling"></i></div>
        <h1>3D NAS</h1>
        <p>نظام إدارة وجدولة ري النباتات المنزلية الذكي</p>
    </div>

    <div class="section">
        <h2><i class="fa-solid fa-leaf"></i> 🪴 نباتاتي الحالية (المضافة للرعاية)</h2>
        <div class="my-plants-grid" id="myPlantsGrid">
            </div>
    </div>

    <div class="section">
        <h2><i class="fa-solid fa-faucet-drip"></i> 💧 جدولة وحساب موعد الري</h2>
        <div class="input-group">
            <select id="plantSelect" onchange="updateResultDisplay()">
                </select>
            <button class="btn-main" onclick="saveWatering()">
                تم ري النبتة الآن <i class="fa-solid fa-check" style="margin-right: 5px;"></i>
            </button>
        </div>
        <div class="result" id="resultBox">
            قم بإضافة نباتاتك من المكتبة بالأسفل أولاً لتتمكن من جدولة ريها.
        </div>
    </div>

    <div class="section">
        <h2><i class="fa-solid fa-book"></i> 📖 دليل ومكتبة نباتات 3D NAS (اختر لنباتاتك)</h2>
        <div class="plants-library" id="libraryContainer">
            </div>
    </div>

    <a class="store-btn" href="https://3d-nas.com/ar" target="_blank">
        <i class="fa-solid fa-bag-shopping"></i> زيارة متجر 3D NAS الفاخر
    </a>

    <footer>
        🌿 جميع الحقوق محفوظة لـ 3D NAS &copy; 2026
    </footer>

</div>

<script>
// مصفوفة الـ 35 نبتة التي زودتني بها مع فترات ري تقديرية مقترحة (بالأيام) لجدولتها
const plantsData = [
    { name: "ساق البامبو", days: 7 }, { name: "الزاميا", days: 14 }, { name: "إبرة الراعي", days: 5 },
    { name: "شجرة الفيل الملونة", days: 7 }, { name: "نبات العنكبوت", days: 6 }, { name: "تراديسكانتيا زبرينا", days: 7 },
    { name: "رجلة الصبار", days: 12 }, { name: "البوتس", days: 5 }, { name: "البيبروميا", days: 9 },
    { name: "بيبروميا راين دروب", days: 9 }, { name: "نخيل القطة", days: 6 }, { name: "الأنثوريوم", days: 7 },
    { name: "السينغونيوم", days: 6 }, { name: "الدراسينا", days: 8 }, { name: "ألوكاسيا أذن الفيل", days: 7 },
    { name: "فيلوديندرون القمرية", days: 8 }, { name: "الكروتون", days: 5 }, { name: "دراسينا ريفلكسا", days: 8 },
    { name: "دراسينا فراجرانس", days: 10 }, { name: "اليوكا", days: 12 }, { name: "فيكس ليراتا (شجرة الكمان)", days: 7 },
    { name: "الفيكس المطاطي", days: 9 }, { name: "زنبق السلام", days: 5 }, { name: "الشيفليرا", days: 7 },
    { name: "الإشيفيريا", days: 14 }, { name: "الأجلونيما", days: 8 }, { name: "البونساي", opacity: 10, days: 10 },
    { name: "الديفنباخيا", days: 7 }, { name: "السانسيفيريا", days: 14 }, { name: "الكالاتيا", days: 6 },
    { name: "المونستيرا", days: 7 }, { name: "فيلوديندرون إيروبيسنس", days: 8 }, { name: "الكورديلين", days: 7 },
    { name: "سانسيفيريا مون شاين", days: 14 }, { name: "عصفور الجنة الأبيض", days: 7 }
];

// قائمة النباتات التي يختارها المستخدم (تُسترجع من الـ LocalStorage إن وجدت)
let myPlants = JSON.parse(localStorage.getItem("my_selected_plants")) || [];

// 1. بناء مكتبة النباتات الكاملة بالصفحة
function buildLibrary() {
    const container = document.getElementById("libraryContainer");
    container.innerHTML = "";
    
    plantsData.forEach(plant => {
        const item = document.createElement("div");
        item.className = "library-item";
        item.innerHTML = `
            <div class="library-info">
                <h3>${plant.name}</h3>
                <span>الري المقترح: كل ${plant.days} أيام</span>
            </div>
            <button class="add-plant-btn" onclick="addPlantToMyList('${plant.name}', ${plant.days})">
                <i class="fa-solid fa-plus"></i> إضافة لنباتاتي
            </button>
        `;
        container.appendChild(item);
    });
}

// 2. إضافة نبتة إلى قائمة المستخدم
function addPlantToMyList(name, days) {
    if (myPlants.some(p => p.name === name)) {
        alert("هذه النبتة مضافة بالفعل في قائمة رعايتك الحالية!");
        return;
    }
    myPlants.push({ name, days });
    saveToStorage();
    renderMyPlants();
}

// 3. حذف نبتة من قائمة المستخدم
function removePlantFromMyList(name) {
    myPlants = myPlants.filter(p => p.name !== name);
    localStorage.removeItem("3dnas_water_" + name); // حذف تاريخ ريها أيضاً
    saveToStorage();
    renderMyPlants();
}

// حفظ القائمة الأساسية بالمتصفح
function saveToStorage() {
    localStorage.setItem("my_selected_plants", JSON.stringify(myPlants));
}

// 4. عرض نباتات المستخدم الحالية وتحديث القوائم المنسدلة للري
function renderMyPlants() {
    const grid = document.getElementById("myPlantsGrid");
    const select = document.getElementById("plantSelect");
    
    grid.innerHTML = "";
    select.innerHTML = "";
    
    if (myPlants.length === 0) {
        grid.innerHTML = `<div class="empty-message">لم تقم بإضافة أي نباتات بعد. اختر من المكتبة أدناه لبدء الجدولة! ✨</div>`;
        select.innerHTML = `<option value="">لا توجد نباتات مضافة</option>`;
        document.getElementById("resultBox").innerHTML = "قم بإضافة نباتاتك من المكتبة بالأسفل أولاً لتتمكن من جدولة ريها.";
        return;
    }
    
    myPlants.forEach(plant => {
        // عرض الكروت الفاخرة المضافة
        const card = document.createElement("div");
        card.className = "my-plant-card";
        card.innerHTML = `
            <span>🌿 ${plant.name}</span>
            <button class="remove-btn" onclick="removePlantFromMyList('${plant.name}')" title="حذف">
                <i class="fa-solid fa-trash-can"></i>
            </button>
        `;
        grid.appendChild(card);
        
        // تعبئة خيارات الحساب والجدولة
        const option = document.createElement("option");
        option.value = plant.days;
        option.text = `${plant.name} - كل ${plant.days} أيام`;
        option.setAttribute("data-name", plant.name);
        select.appendChild(option);
    });
    
    updateResultDisplay();
}

// 5. حفظ وحساب موعد الري للنبتة المحددة
function saveWatering(){
    let selectElement = document.getElementById("plantSelect");
    if(myPlants.length === 0 || !selectElement.value) return;
    
    let days = selectElement.value;
    let selectedOption = selectElement.options[selectElement.selectedIndex];
    let plantName = selectedOption.getAttribute("data-name");

    let nextDate = new Date();
    nextDate.setDate(nextDate.getDate() + parseInt(days));

    localStorage.setItem("3dnas_water_" + plantName, nextDate);
    showDateResult(plantName, nextDate);
}

// تحديث العرض في الصندوق بناءً على النبتة المختارة
function updateResultDisplay() {
    let selectElement = document.getElementById("plantSelect");
    if(myPlants.length === 0 || !selectElement.value) return;
    
    let selectedOption = selectElement.options[selectElement.selectedIndex];
    let plantName = selectedOption.getAttribute("data-name");
    
    let savedDate = localStorage.getItem("3dnas_water_" + plantName);
    
    if(savedDate){
        showDateResult(plantName, new Date(savedDate));
    } else {
        document.getElementById("resultBox").innerHTML = `🌱 لم يتم تسجيل ري لنبتة <b>(${plantName})</b> مؤخراً، اضغط على زر "تم ري النبتة الآن" لتفعيل الجدولة.`;
    }
}

function showDateResult(name, dateObj) {
    let formattedDate = dateObj.toLocaleDateString("ar-SA", { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById("resultBox").innerHTML = `📅 موعد الري القادم لنبتة <span style="color:#4a7c59;"><b>${name}</b></span> هو:<br><br><b>${formattedDate}</b>`;
}

// عند تشغيل الصفحة لأول مرة
window.onload = function(){
    buildLibrary();
    renderMyPlants();
}
</script>

</body>
</html>
